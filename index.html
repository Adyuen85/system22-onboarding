<script>
    let currentStep = 1;
    const totalSteps = 13;

    let config = {
        LANGUAGE: 'English',
        ASSISTANT_NAME: 'Isaiah',
        BUSINESS_NAME: '',
        LOCATION: '',
        RADIUS_MILES: null,
        BUDGET_MIN: null,
        WORK_CATEGORIES: [],
        SERVICES_LIST: [],
        OTHER_SERVICES: '',
        LOGO_BASE64: '',
        WORK_PHOTOS_BASE64: [],
        OWNER_PHONE: '',
        OWNER_EMAIL: '',
        RESERVE_LOGO: true,
        RESERVE_WEBSITE: true,
        RESERVE_AUTO_ADS: true
    };

    const categories = {
        'General Handyman': ['drywall repair', 'painting', 'general repairs', 'fixture installations', 'door installation', 'trim work'],
        'Plumbing': ['toilet repair', 'faucet replacement', 'sink installation', 'minor plumbing leak repair', 'unclogging drains'],
        'Electrical': ['outlet/switch replacement', 'light fixture installation', 'ceiling fan installation', 'dimmer switch installation', 'smoke detector installation'],
        'Carpentry': ['cabinet installation', 'shelving installation', 'deck building', 'fence building', 'trim and molding installation'],
        'Flooring & Tile': ['tile work', 'flooring', 'floor installation (laminate/vinyl)', 'tile repair', 'grout cleaning'],
        'Painting & Finishing': ['painting', 'wallpaper removal', 'caulking (kitchen/bath)', 'weatherproofing'],
        'Home Improvement': ['kitchen renovation', 'bathroom renovation', 'window installation', 'gutter cleaning', 'pressure washing'],
        'Outdoor & Exterior': ['roof repairs', 'fence building', 'deck repair', 'gutter repair', 'concrete patching'],
        'Specialty Services': ['auto mechanical maintenance', 'locksmith services', 'junk removal (small loads)', 'appliance installation', 'smart home device setup']
    };

    let selectedCategories = [];
    let availableServices = [];
    let workPhotosArray = [];

    // Fix repeated file upload not triggering on mobile
    document.addEventListener('click', function(e) {
        if (e.target.closest('.file-upload')) {
            const input = e.target.closest('.file-upload').nextElementSibling;
            if (input && input.type === 'file') {
                input.value = ''; // reset to force re-trigger
            }
        }
    });

    window.onload = () => {
        initializeCategories();
        updateProgress();
        updateButtons();
    };

    function initializeCategories() {
        const grid = document.getElementById('categoryGrid');
        Object.keys(categories).forEach(cat => {
            const btn = document.createElement('button');
            btn.className = 'btn btn-category';
            btn.textContent = cat;
            btn.onclick = () => toggleCategory(cat, btn);
            grid.appendChild(btn);
        });
    }

    function toggleCategory(cat, btn) {
        if (selectedCategories.includes(cat)) {
            selectedCategories = selectedCategories.filter(c => c !== cat);
            btn.classList.remove('selected');
        } else {
            selectedCategories.push(cat);
            btn.classList.add('selected');
        }
        config.WORK_CATEGORIES = selectedCategories;
    }

    function buildServicesList() {
        availableServices = [];
        selectedCategories.forEach(cat => {
            availableServices = availableServices.concat(categories[cat]);
        });
        availableServices = [...new Set(availableServices)];
        const list = document.getElementById('servicesList');
        list.innerHTML = '';
        availableServices.forEach((service, index) => {
            const item = document.createElement('div');
            item.className = 'service-item';
            item.innerHTML = `
                <input type="checkbox" id="service-${index}" checked onchange="updateServiceSelection()">
                <label for="service-${index}">${service}</label>
            `;
            list.appendChild(item);
        });
        updateServiceSelection();
    }

    function updateServiceSelection() {
        config.SERVICES_LIST = availableServices.filter((_, index) =>
            document.getElementById(`service-${index}`)?.checked
        );
    }

    function selectAllServices() {
        availableServices.forEach((_, index) => {
            const checkbox = document.getElementById(`service-${index}`);
            if (checkbox) checkbox.checked = true;
        });
        updateServiceSelection();
    }

    function clearAllServices() {
        availableServices.forEach((_, index) => {
            const checkbox = document.getElementById(`service-${index}`);
            if (checkbox) checkbox.checked = false;
        });
        updateServiceSelection();
    }

    function selectLanguage(lang) {
        config.LANGUAGE = lang;
        document.querySelectorAll('[data-step="1"] .btn').forEach(btn => btn.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    function selectName(name) {
        config.ASSISTANT_NAME = name;
        document.getElementById('customName').value = '';
        document.querySelectorAll('[data-step="2"] .btn').forEach(btn => btn.classList.remove('selected'));
        event.target.classList.add('selected');
    }

    function handleCustomName(value) {
        if (value.trim()) {
            config.ASSISTANT_NAME = value.trim();
            document.querySelectorAll('[data-step="2"] .btn').forEach(btn => btn.classList.remove('selected'));
        }
    }

    function handleLogoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            config.LOGO_BASE64 = e.target.result;
            document.getElementById('logoUpload').innerHTML = `
                <div class="upload-icon" style="color: #0A6B7A;">✓</div>
                <div>Logo uploaded</div>
            `;
            document.getElementById('logoPreview').innerHTML = `
                <div style="text-align: center; margin-top: 16px;">
                    <img src="${e.target.result}" style="max-width: 200px; max-height: 200px; border-radius: 12px; border: 2px solid #0A6B7A;">
                </div>
            `;
        };
        reader.readAsDataURL(file);
    }

    function handleWorkPhotos(event) {
        const files = Array.from(event.target.files);
        files.forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => {
                workPhotosArray.push(e.target.result);
                config.WORK_PHOTOS_BASE64 = workPhotosArray;
                displayPhotoGrid();
            };
            reader.readAsDataURL(file);
        });
    }

    function displayPhotoGrid() {
        const grid = document.getElementById('photoGrid');
        grid.innerHTML = '';
        workPhotosArray.forEach((photo, index) => {
            const div = document.createElement('div');
            div.className = 'photo-thumb';
            div.innerHTML = `
                <img src="${photo}">
                <button class="photo-remove" onclick="removePhoto(${index})">×</button>
            `;
            grid.appendChild(div);
        });
    }

    function removePhoto(index) {
        workPhotosArray.splice(index, 1);
        config.WORK_PHOTOS_BASE64 = workPhotosArray;
        displayPhotoGrid();
    }

    function updateProgress() {
        const progress = (currentStep / totalSteps) * 100;
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = Math.round(progress) + '% Complete';
    }

    function updateButtons() {
        const backBtn = document.getElementById('backBtn');
        const nextBtn = document.getElementById('nextBtn');
        backBtn.style.display = currentStep === 1 ? 'none' : 'block';
        nextBtn.textContent = currentStep === totalSteps ? 'Submit ✓' : 'Next →';
    }

    function nextStep() {
        if (currentStep === 3) config.BUSINESS_NAME = document.getElementById('businessName').value.trim();
        if (currentStep === 4) config.LOCATION = document.getElementById('location').value.trim();
        if (currentStep === 5) {
            const radius = document.getElementById('radius').value;
            config.RADIUS_MILES = radius ? parseInt(radius) : null;
        }
        if (currentStep === 6) {
            const budget = document.getElementById('budget').value;
            config.BUDGET_MIN = budget ? parseInt(budget) : null;
        }
        if (currentStep === 7) {
            if (selectedCategories.length === 0) {
                alert('Please select at least one work category');
                return;
            }
            buildServicesList();
        }
        if (currentStep === 8) config.OTHER_SERVICES = document.getElementById('otherServices').value.trim();
        if (currentStep === 11) {
            config.OWNER_PHONE = document.getElementById('ownerPhone').value.trim();
            config.OWNER_EMAIL = document.getElementById('ownerEmail').value.trim();
            if (!config.OWNER_PHONE || !config.OWNER_EMAIL) {
                alert('Please enter your phone and email');
                return;
            }
        }
        if (currentStep === 12) {
            config.RESERVE_LOGO = document.getElementById('reserveLogo').checked;
            config.RESERVE_WEBSITE = document.getElementById('reserveWebsite').checked;
            config.RESERVE_AUTO_ADS = document.getElementById('reserveAutoAds').checked;
        }
        if (currentStep === totalSteps) {
            submitOnboarding();
            return;
        }
        if (currentStep === 12) showReview();
        document.querySelector(`[data-step="${currentStep}"]`).classList.remove('active');
        currentStep++;
        document.querySelector(`[data-step="${currentStep}"]`).classList.add('active');
        updateProgress();
        updateButtons();
        document.querySelector('.content').scrollTop = 0;
    }

    function previousStep() {
        if (currentStep === 1) return;
        document.querySelector(`[data-step="${currentStep}"]`).classList.remove('active');
        currentStep--;
        document.querySelector(`[data-step="${currentStep}"]`).classList.add('active');
        updateProgress();
        updateButtons();
        document.querySelector('.content').scrollTop = 0;
    }

    function showReview() {
        const reviewContent = document.getElementById('reviewContent');
        reviewContent.innerHTML = `
            <div class="review-item">
                <div class="review-item-header">
                    <span class="review-label">Language</span>
                    <span class="edit-link" onclick="goToStep(1)">Edit</span>
                </div>
                <div class="review-value">${config.LANGUAGE}</div>
            </div>
            <div class="review-item">
                <div class="review-item-header">
                    <span class="review-label">Assistant Name</span>
                    <span class="edit-link" onclick="goToStep(2)">Edit</span>
                </div>
                <div class="review-value">${config.ASSISTANT_NAME}</div>
            </div>
            <div class="review-item">
                <div class="review-item-header">
                    <span class="review-label">Business Name</span>
                    <span class="edit-link" onclick="goToStep(3)">Edit</span>
                </div>
                <div class="review-value">${config.BUSINESS_NAME || 'Not provided'}</div>
            </div>
            <!-- Add other review items as needed -->
        `;
    }

    function goToStep(step) {
        document.querySelector(`[data-step="${currentStep}"]`).classList.remove('active');
        currentStep = step;
        document.querySelector(`[data-step="${currentStep}"]`).classList.add('active');
        updateProgress();
        updateButtons();
        document.querySelector('.content').scrollTop = 0;
    }

    async function submitOnboarding() {
        try {
            const response = await fetch('https://augustly-nonevincible-samual.ngrok-free.dev/onboard', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(config)
            });
            if (response.ok) {
                document.getElementById('modalMessage').textContent = 
                    'Setup complete! Your assistant is ready. Check back later for generated items.';
                document.getElementById('successModal').classList.add('active');
            } else {
                throw new Error('Server error');
            }
        } catch (error) {
            document.getElementById('modalMessage').textContent = 
                'Error submitting setup. Check connection and try again.';
            document.getElementById('successModal').classList.add('active');
        }
    }

    function closeModal() {
        document.getElementById('successModal').classList.remove('active');
    }

    // PWA service worker (keep if you want offline support)
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            const swCode = `
                self.addEventListener('install', e => e.waitUntil(caches.open('system22-v1').then(cache => cache.addAll(['/']))));
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(res => res || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(blob));
        });
    }
</script>
